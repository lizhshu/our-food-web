<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康铺子</title>
<!-- 替换为国内可访问的稳定CDN源 -->
<script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"微软雅黑",system-ui,sans-serif;
}
:root{
    --main-yellow:#ccaa66;
    --light-yellow:#f2d399;
    --bg-warm:#fffdf0;
    --border-yellow:#e6d8b8;
    --text-dark:#2c2c2c;
    --text-gray:#666;
    --shadow-sm:0 2px 8px rgba(204,170,102,0.12);
    --shadow-md:0 4px 16px rgba(204,170,102,0.18);
    --radius-base:16px;
    --radius-round:999px;
}
body{
    background:var(--bg-warm);
    padding:24px 16px;
    max-width:620px;
    margin:0 auto;
    color:var(--text-dark);
    line-height:1.6;
}
.title{
    text-align:center;
    color:var(--main-yellow);
    font-size:32px;
    margin:12px 0 32px;
    font-weight:600;
    letter-spacing:2px;
    position:relative;
}
.title::after{
    content:"";
    display:block;
    width:80px;
    height:3px;
    background:linear-gradient(90deg,transparent,var(--light-yellow),transparent);
    margin:10px auto 0;
    border-radius:3px;
}
.card{
    background:#ffffff;
    border-radius:var(--radius-base);
    padding:24px;
    margin-bottom:22px;
    box-shadow:var(--shadow-sm);
    border:1px solid rgba(230,216,184,0.4);
    transition:0.25s ease;
}
.card:hover{
    box-shadow:var(--shadow-md);
    transform:translateY(-2px);
}
.card h3{
    color:var(--main-yellow);
    margin-bottom:16px;
    font-size:18px;
    display:flex;
    align-items:center;
    gap:8px;
}
.booking-toggle{
    color:var(--main-yellow);
    cursor:pointer;
    font-weight:bold;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(242,211,153,0.15);
    display:inline-block;
    transition:0.2s;
}
.booking-toggle:hover{
    background:rgba(242,211,153,0.28);
}
.booking-box{
    display:none;
    margin-top:16px;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}
.booking-box input,.booking-box select{
    padding:10px 14px;
    border-radius:12px;
    border:1px solid var(--border-yellow);
    background:#fff;
    font-size:15px;
    outline:none;
    transition:0.2s;
}
.booking-box input:focus,.booking-box select:focus{
    border-color:var(--main-yellow);
    box-shadow:0 0 0 3px rgba(204,170,102,0.15);
}
#remark{
    width:100%;
    height:80px;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border-yellow);
    resize:none;
    background:#fff;
    margin-top:4px;
    font-size:15px;
    outline:none;
    transition:0.2s;
}
#remark:focus{
    border-color:var(--main-yellow);
    box-shadow:0 0 0 3px rgba(204,170,102,0.15);
}
.user-select{
    margin:4px 0;
    display:flex;
    gap:32px;
}
.user-item{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text-dark);
    font-size:16px;
    cursor:pointer;
}
.food-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 0;
    border-bottom:1px solid #f5f1e7;
    font-size:16px;
}
.food-item:last-child{
    border-bottom:none;
}
.count-btn{
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:var(--light-yellow);
    color:#fff;
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
}
.count-btn:hover{
    background:var(--main-yellow);
}
.count-btn:active{
    transform:scale(0.92);
}
.food-item span:nth-child(2){
    display:inline-block;
    min-width:26px;
    text-align:center;
    font-weight:500;
}
.cart{
    margin-top:8px;
    min-height:44px;
    color:var(--text-gray);
    line-height:1.8;
    padding:10px 12px;
    background:#fffdf6;
    border-radius:12px;
}
.btn{
    background:linear-gradient(135deg,var(--light-yellow),var(--main-yellow));
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:var(--radius-round);
    width:100%;
    font-size:17px;
    font-weight:500;
    margin-top:16px;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 4px 12px rgba(204,170,102,0.25);
}
.btn:hover{
    opacity:0.92;
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(204,170,102,0.3);
}
.btn:active{
    transform:translateY(0);
}
.btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
}
#cardContent{
    position:absolute;
    left:-9999px;
    top:-9999px;
    padding:28px;
    background:#fff;
    border-radius:18px;
    line-height:2;
    font-size:16px;
    width:340px;
    border:2px solid var(--light-yellow);
}
#cardContent strong{
    color:var(--main-yellow);
    font-size:17px;
}
#order-card{
    background:#fff;
    padding:26px;
    border-radius:20px;
    margin-top:24px;
    display:none;
    text-align:center;
    box-shadow:var(--shadow-md);
    border:1px solid var(--border-yellow);
}
#order-card h3{
    margin-bottom:18px;
}
#order-img{
    width:100%;
    border-radius:14px;
    border:2px solid var(--light-yellow);
}
.loading-text{
    color:var(--main-yellow);
    margin:20px 0;
}
.error-text{
    color:#e53e3e;
    margin:20px 0;
}
</style>
</head>
<body>
<h1 class="title">🍕 健康铺子</h1>

<div class="card">
<div class="booking-toggle" onclick="toggleBooking()">➕ 添加预约时间</div>
<div class="booking-box" id="bookingBox">
<input type="date" id="orderDate">
<select id="orderHour">
<option value="">整点</option>
<option>7</option><option>8</option><option>9</option><option>10</option><option>11</option>
<option>12</option><option>17</option><option>18</option><option>19</option>
</select>
<span>点左右</span>
</div>
</div>

<div class="card">
<h3>👤 点餐人</h3>
<div class="user-select">
<div class="user-item">
<input type="radio" name="user" id="oda" value="小咪" checked>
<label for="oda">小咪</label>
</div>
<div class="user-item">
<input type="radio" name="user" id="odb" value="小根">
<label for="odb">小根</label>
</div>
</div>
</div>

<div class="card">
<h3>📝 备注（可选）</h3>
<textarea id="remark" placeholder="客官有备注吗：少糖、常温、加个枣、不吃辣..."></textarea>
</div>

<div class="card">
<h3>🍔 菜单</h3>
<div id="foodList"></div>
</div>

<div class="card">
<h3>🛒 点餐清单</h3>
<div class="cart" id="cartList">暂无点餐</div>
<button class="btn" id="generateBtn" onclick="createCard()">✅ 生成点餐卡片</button>
</div>

<div id="order-card">
<h3 style="color:#ccaa66;">📝 点餐卡预览</h3>
<div id="cardContent"></div>
<div id="loadingText" class="loading-text" style="display:none;">正在生成图片，请稍候...</div>
<div id="errorText" class="error-text" style="display:none;">生成失败，请刷新页面重试</div>
<img id="order-img" alt="点餐卡图片" style="display:none;">
</div>

<script>
let foods = {};
let foodMap = {};

const MENU_CONFIG = [
  {"id":"noodle","name":"番茄鸡蛋面"},
  {"id":"wing","name":"奥尔良烤翅"},
  {"id":"salad","name":"水果沙拉"},
  {"id":"applejuice","name":"苹果陈皮水"},
  {"id":"coixseed","name":"炒薏苡仁茯苓陈皮"}
];

function renderMenu() {
  const el = document.getElementById('foodList');
  el.innerHTML = '';
  MENU_CONFIG.forEach(item => {
    foods[item.id] = 0;
    foodMap[item.id] = item.name;
    el.innerHTML += `
    <div class="food-item">
      <span>${item.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="count-btn" onclick="changeNum('${item.id}',-1)">-</button>
        <span id="${item.id}">0</span>
        <button class="count-btn" onclick="changeNum('${item.id}',1)">+</button>
      </div>
    </div>`;
  });
}

function toggleBooking() {
  const b = document.getElementById('bookingBox');
  b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
}

function changeNum(key, n) {
  foods[key] = Math.max(0, foods[key] + n);
  document.getElementById(key).innerText = foods[key];
  showCart();
}

function showCart() {
  const list = [];
  for (let k in foods) {
    if (foods[k] > 0) list.push(foodMap[k] + ' × ' + foods[k]);
  }
  document.getElementById('cartList').innerHTML = list.join('<br>') || '暂无点餐';
}

async function createCard() {
  const btn = document.getElementById('generateBtn');
  const loadingText = document.getElementById('loadingText');
  const errorText = document.getElementById('errorText');
  const orderImg = document.getElementById('order-img');
  
  // 防止重复点击
  btn.disabled = true;
  btn.innerText = '生成中...';
  loadingText.style.display = 'block';
  errorText.style.display = 'none';
  orderImg.style.display = 'none';
  
  try {
    const user = document.querySelector('input[name="user"]:checked').value;
    const date = document.getElementById('orderDate').value;
    const hour = document.getElementById('orderHour').value;
    const time = (date && hour) ? `预约：${date} ${hour}点左右` : '预约：无';
    const cart = document.getElementById('cartList').innerText;
    const remark = document.getElementById('remark').value.trim() || '无备注';

    const content = document.getElementById('cardContent');
    content.innerHTML = `
<strong>点餐人：</strong>${user}<br><br>
<strong>${time}</strong><br><br>
<strong>点餐内容：</strong><br>${cart}<br><br>
<strong>备注：</strong>${remark}
    `;
    
    document.getElementById('order-card').style.display = 'block';
    
    // 检查html2canvas是否加载成功
    if (typeof html2canvas === 'undefined') {
      throw new Error('截图库加载失败');
    }
    
    const canvas = await html2canvas(content, {
      scale:3,
      backgroundColor:'#ffffff',
      useCORS:true,
      allowTaint:true,
      logging:false
    });
    
    orderImg.src = canvas.toDataURL('image/png');
    orderImg.style.display = 'block';
    loadingText.style.display = 'none';
    
  } catch (error) {
    console.error('生成失败:', error);
    loadingText.style.display = 'none';
    errorText.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerText = '✅ 生成点餐卡片';
  }
}

// 初始化
renderMenu();
</script>
</body>
</html>
