<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康铺子</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{background:#fffdf0;padding:20px;max-width:600px;margin:0 auto}
.title{text-align:center;color:#ccaa66;font-size:28px;margin:20px 0;font-weight:500}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 2px 6px #f0e8d8}
.booking-toggle{color:#ccaa66;cursor:pointer;font-weight:bold}
.booking-box{display:none;margin:10px 0}
.booking-box input,.booking-box select{padding:8px;border-radius:10px;border:1px solid #e6d8b8;margin:5px;background:#fff}
/* 备注框样式 */
#remark{width:100%;height:60px;padding:10px;border-radius:10px;border:1px solid #e6d8b8;resize:none;background:#fff;margin-top:5px}
.user-select{margin:10px 0;display:flex;gap:20px}
.user-item{display:flex;align-items:center;gap:5px;color:#444}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f1e7;font-size:16px;color:#333}
.count-btn{width:32px;height:32px;border-radius:50%;border:none;background:#f2d399;color:#fff;cursor:pointer}
.cart{margin-top:15px;min-height:40px;color:#444}
.btn{background:#f2d399;color:white;border:none;padding:12px 25px;border-radius:30px;width:100%;font-size:16px;margin:10px 0;cursor:pointer}
#cardContent{position:absolute;left:-9999px;top:-9999px;padding:20px;background:#fff;border-radius:15px;line-height:1.8;font-size:16px;width:300px}
#order-card{background:#fff;padding:20px;border-radius:20px;margin-top:20px;display:none;text-align:center;box-shadow:0 2px 6px #f0e8d8}
#order-img{width:100%;border-radius:10px;border:1px solid #f0e8d8}
</style>
</head>
<body>
<h1 class="title">🍕 健康铺子</h1>

<div class="card">
<div class="booking-toggle" onclick="toggleBooking()">➕ 添加预约时间</div>
<div class="booking-box" id="bookingBox">
<input type="date" id="orderDate">
<select id="orderHour">
<option value="">整点</option>
<option>7</option><option>8</option><option>9</option><option>10</option><option>11</option>
<option>12</option><option>17</option><option>18</option><option>19</option>
</select> 点左右
</div>
</div>

<div class="card">
<h3 style="color:#ccaa66;margin-bottom:10px;">👤 点餐人</h3>
<div class="user-select">
<div class="user-item"><input type="radio" name="user" id="oda" value="ODA" checked><label for="oda">小咪</label></div>
<div class="user-item"><input type="radio" name="user" id="odb" value="ODB"><label for="odb">小根</label></div>
</div>
</div>

<!--  ========== 新增：备注输入栏  ========== -->
<div class="card">
<h3 style="color:#ccaa66;margin-bottom:10px;">📝 备注（可选）</h3>
<textarea id="remark" placeholder="客官有备注吗：少糖、常温、加个枣、不吃辣..."></textarea>
</div>

<div class="card">
<h3 style="color:#ccaa66;margin-bottom:10px;">🍔 菜单</h3>
<div id="foodList"></div>
</div>

<div class="card">
<h3 style="color:#ccaa66;margin-bottom:10px;">🛒 点餐清单</h3>
<div class="cart" id="cartList">暂无点餐</div>
<button class="btn" onclick="createCard()">✅ 生成点餐卡片</button>
</div>

<div id="order-card">
<h3 style="color:#ccaa66;">📝 点餐卡</h3>
<div id="cardContent"></div>
<img id="order-img" alt="点餐卡">
</div>

<script>
let foods = {};
let foodMap = {};

// 菜单配置（改这里就行）
const MENU_CONFIG = [
  {"id":"noodle","name":"番茄鸡蛋面"},
  {"id":"wing","name":"奥尔良烤翅"},
  {"id":"salad","name":"水果沙拉"},
  {"id":"applejuice","name":"苹果陈皮水"},
  {"id":"coixseed","name":"炒薏苡仁茯苓陈皮"}
];

// 渲染菜单
function renderMenu() {
  const el = document.getElementById('foodList');
  el.innerHTML = '';
  MENU_CONFIG.forEach(item => {
    foods[item.id] = 0;
    foodMap[item.id] = item.name;
    el.innerHTML += `
    <div class="food-item">
      <span>${item.name}</span>
      <div>
        <button class="count-btn" onclick="changeNum('${item.id}',-1)">-</button>
        <span id="${item.id}" style="margin:0 8px;">0</span>
        <button class="count-btn" onclick="changeNum('${item.id}',1)">+</button>
      </div>
    </div>`;
  });
}

function toggleBooking() {
  const b = document.getElementById('bookingBox');
  b.style.display = b.style.display === 'block' ? 'none' : 'block';
}

function changeNum(key, n) {
  foods[key] = Math.max(0, foods[key] + n);
  document.getElementById(key).innerText = foods[key];
  showCart();
}

function showCart() {
  const list = [];
  for (let k in foods) {
    if (foods[k] > 0) list.push(foodMap[k] + ' × ' + foods[k]);
  }
  document.getElementById('cartList').innerHTML = list.join('<br>') || '暂无点餐';
}

async function createCard() {
  const user = document.querySelector('input[name="user"]:checked').value;
  const date = document.getElementById('orderDate').value;
  const hour = document.getElementById('orderHour').value;
  const time = (date && hour) ? `预约：${date} ${hour}点左右` : '预约：无';
  const cart = document.getElementById('cartList').innerText;
  // ========== 新增：获取备注内容 ==========
  const remark = document.getElementById('remark').value.trim() || '无备注';

  // ========== 新增：备注拼接到图片里 ==========
  const content = document.getElementById('cardContent');
  content.innerHTML = `
点餐人：${user}<br><br>
${time}<br><br>
点餐内容：<br>${cart}<br><br>
备注：${remark}
`;
  
  document.getElementById('order-card').style.display = 'block';
  const canvas = await html2canvas(content, { scale:2, backgroundColor:'#fff' });
  document.getElementById('order-img').src = canvas.toDataURL('image/png');
}

// 初始化
renderMenu();
</script>
</body>
</html>
